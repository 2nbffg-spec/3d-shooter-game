<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shooter Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: #0a0e27;
        }
        
        #gameContainer {
            width: 100vw;
            height: 100vh;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            font-family: 'Courier New', monospace;
            z-index: 100;
            background: rgba(0, 20, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
        }
        
        #hudRight {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ffff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            font-family: 'Courier New', monospace;
            z-index: 100;
            text-align: right;
            background: rgba(0, 20, 40, 0.7);
            padding: 15px;
            border: 2px solid #00ffff;
            border-radius: 5px;
        }
        
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #ff0080;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            box-shadow: 0 0 10px #ff0080, inset 0 0 10px #ff0080;
        }
        
        #crosshair::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: #ff0080;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0080;
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.95);
            padding: 50px;
            border: 3px solid #ff0080;
            text-align: center;
            display: none;
            z-index: 200;
            border-radius: 10px;
            box-shadow: 0 0 50px #ff0080;
        }
        
        #gameOver h1 {
            color: #ff0080;
            font-size: 60px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #ff0080, 0 0 60px #ff0080;
        }
        
        #gameOver p {
            color: #00ff00;
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #gameOver button {
            background: linear-gradient(135deg, #00ff00, #00ffff);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 30px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 0 20px #00ff00;
        }
        
        #gameOver button:hover {
            transform: scale(1.15);
            box-shadow: 0 0 40px #00ff00, 0 0 20px #00ffff;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            text-align: center;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 20, 40, 0.7);
            padding: 10px 20px;
            border: 1px solid #00ffff;
            border-radius: 5px;
            text-shadow: 0 0 5px #00ffff;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    
    <div id="hud">
        <div>❤ HEALTH: <span id="health">100</span></div>
        <div>🔫 AMMO: <span id="ammo">∞</span></div>
        <div>📍 LEVEL: <span id="level">1</span></div>
    </div>
    
    <div id="hudRight">
        <div>💰 SCORE: <span id="score">0</span></div>
        <div>👾 ENEMIES: <span id="enemies">0</span></div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="gameOver">
        <h1>⚠ GAME OVER ⚠</h1>
        <p>💰 Final Score: <span id="finalScore">0</span></p>
        <p>📊 Level Reached: <span id="levelReached">1</span></p>
        <button onclick="location.reload()">► PLAY AGAIN ◄</button>
    </div>
    
    <div id="controls">
        <div>⬆⬅⬇➡ WASD - Move | 🖱 Mouse - Look | 🖱 Click - Shoot | SPACE - Jump</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
